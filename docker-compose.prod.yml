services:

  mongo:
    image: mongo:7
    container_name: commit31_mongo_prod
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    container_name: commit31_backend_prod
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGO_URI=mongodb://mongo:27017/commit31
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    container_name: commit31_frontend_prod
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:8080"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongo_data: